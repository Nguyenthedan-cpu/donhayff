<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensitivity Free Fire</title>
    <style>
        body { background: #0a0e17; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b2a; padding: 40px 30px; border-radius: 25px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #2d3748; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: #5eead4; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #374151; background: #1f2937; color: white; box-sizing: border-box; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #22d3ee, #5eead4); font-weight: bold; cursor: pointer; color: black; }
        
        #error-msg { color: #ff4d4d; margin-top: 10px; display: none; font-size: 14px; }
        #loading { display: none; margin-top: 20px; color: #5eead4; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="login-container" class="card">
    <h3>NHẬP KEY APP</h3>
    <p style="color: #6b7280; font-size: 14px;">Sensitivity Free Fire</p>
    <input type="text" id="key-input" placeholder="Nhập KEY của bạn...">
    <button class="btn" onclick="checkKey()">Unlock Sensitivity 🔓</button>
    <div id="error-msg">❌ KEY không đúng, vui lòng thử lại!</div>
    <div id="loading">⏳ Đang xác thực...</div>
</div>

<div id="app-content" class="card">
    <h3>SENSITIVITY FREE FIRE</h3>
    <p>Chào mừng bạn đã mở khóa thành công!</p>
    <button class="btn" onclick="location.reload()">Đăng xuất</button>
</div>

<script>
    function checkKey() {
        const key = document.getElementById('key-input').value;
        const errorMsg = document.getElementById('error-msg');
        
        if(key === "donhayff") {
            errorMsg.style.display = 'none';
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }, 1500);
        } else {
            // Hiển thị thông báo đỏ ngay dưới nút
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
