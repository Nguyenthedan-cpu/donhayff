<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensitivity FF OB53</title>
    <style>
        body { background: #0a0e17; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: #161b2a; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid #2d3748; }
        
        /* Cấu trúc các ô chọn (giống ảnh) */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { background: #1f2937; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #374151; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .active { border: 1px solid #5eead4; background: #1e3a3a; color: #5eead4; }
        
        /* Style riêng cho tình trạng */
        .problem-box { padding: 12px; border: 1px solid #374151; background: #1f2937; border-radius: 10px; text-align: center; cursor: pointer; font-size: 13px; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: linear-gradient(90deg, #22d3ee, #5eead4); color: black; }
        #app-content, #loading-screen, #result-screen { display: none; }
        .res-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d3748; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h3>🔑 NHẬP KEY</h3>
    <input type="password" id="key-input" placeholder="Nhập key...">
    <button class="btn" onclick="checkKey()">UNLOCK</button>
    <p id="error-msg" style="color:red; display:none;">Key không đúng!</p>
</div>

<div id="loading-screen" class="card" style="text-align:center;">⏳ Đang xác thực...</div>

<div id="app-content" class="card">
    <h3>SENSITIVITY OB53</h3>
    <div class="grid-2">
        <div id="btn-ios" class="box active" onclick="selectSingle('os', 'btn-ios')">🍎 iOS</div>
        <div id="btn-android" class="box" onclick="selectSingle('os', 'btn-android')">🤖 Android</div>
    </div>
    <select id="device-select"></select>
    
    <div class="grid-2">
        <div id="btn-ff" class="box active" onclick="selectSingle('game', 'btn-ff')">🔥 Free Fire</div>
        <div id="btn-ffmax" class="box" onclick="selectSingle('game', 'btn-ffmax')">💎 FF MAX</div>
    </div>

    <p style="text-align:center; color:#9ca3af; font-size:14px;">TÌNH TRẠNG ĐANG GẶP (CHỌN NHIỀU)</p>
    <div class="grid-2">
        <div class="problem-box" onclick="this.classList.toggle('active')">🎯 Lỗ Đầu</div>
        <div class="problem-box" onclick="this.classList.toggle('active')">💨 Lạc Đạn</div>
        <div class="problem-box" onclick="this.classList.toggle('active')">⚡ Giật Tâm</div>
        <div class="problem-box" onclick="this.classList.toggle('active')">🤯 Nặng Tâm</div>
        <div class="problem-box" onclick="this.classList.toggle('active')">💰 Rung Tay</div>
        <div class="problem-box" onclick="this.classList.toggle('active')">🏃 Trượt Địch</div>
    </div>
    <button class="btn" style="margin-top:10px;" onclick="showResult()">🔍 TÌM ĐỘ NHẠY</button>
</div>

<div id="result-screen" class="card">
    <h3>KẾT QUẢ TỐI ƯU</h3>
    <div id="res-list"></div>
    <button class="btn" style="margin-top:15px;" onclick="location.reload()">🔄 Làm mới</button>
</div>

<script>
    const devices = {
        'btn-ios': ["iPhone 17 Pro Max", "iPhone 16 Pro", "iPhone 15 Pro", "iPhone 14"],
        'btn-android': ["Samsung S24 Ultra", "Vivo V30", "Oppo Reno 11", "Xiaomi 14"]
    };

    function selectSingle(type, id) {
        if(type === 'os') {
            document.querySelectorAll('.grid-2 .box[onclick*="selectSingle(\'os\'"]').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateDevices(id);
        } else {
            document.querySelectorAll('.grid-2 .box[onclick*="selectSingle(\'game\'"]').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    }

    function updateDevices(osId) {
        const sel = document.getElementById('device-select');
        sel.innerHTML = devices[osId].map(d => `<option>${d}</option>`).join('');
    }

    function checkKey() {
        if(document.getElementById('key-input').value === "donhayff") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                updateDevices('btn-ios');
            }, 1500);
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function showResult() {
        const stats = ["Nhìn xung quanh", "Hồng tâm", "Ống ngắm 2x", "Ống ngắm 4x", "Súng ngắm", "Camera tự do"];
        let html = stats.map(s => `<div class="res-item"><span>${s}</span><span style="color:#5eead4; font-weight:bold;">${Math.floor(Math.random() * 50) + 80}</span></div>`).join('');
        document.getElementById('res-list').innerHTML = html;
        document.getElementById('app-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>
</body>
</html>
