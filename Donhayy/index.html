<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel AIM HEAD - 2 Columns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .galaxy-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 50%, #0d0d2b, #05050f); z-index: 0; }
        
        .panel { position: relative; z-index: 10; width: 95%; max-width: 400px; background: rgba(10,10,35,0.85); backdrop-filter: blur(15px); border: 1px solid rgba(120,100,255,0.3); border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; }
        
        .login-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #16162e; padding: 20px; border-radius: 15px; border: 1px solid #6c5ce7; box-shadow: 0 0 20px rgba(108,92,231,0.3); z-index: 20; text-align: center; }
        .login-box input { width: 100%; background: #0a0a1a; border: 1px solid #333; padding: 10px; border-radius: 8px; color: #fff; margin-bottom: 10px; text-align: center; }
        .login-box button { width: 100%; background: #6c5ce7; border: none; padding: 10px; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .panel.hidden { transform: scale(0.9); opacity: 0; pointer-events: none; }
        
        /* Cấu trúc 2 cột chính */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .group-title { color: #82b1ff; font-size: 10px; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; text-align: center; }
        
        /* Danh sách nút dọc trong mỗi cột */
        .column-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
        
        .btn-f { padding: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.03); color: #c8d0ff; font-size: 11px; text-align: center; transition: 0.2s; opacity: 0.3; }
        .btn-f.active { background: rgba(100,80,255,0.3); border-color: #6c5ce7; opacity: 1; color: #fff; }
        .btn-f .icon { font-size: 14px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
<div class="galaxy-bg"></div>

<div class="login-box" id="loginBox">
    <h3 style="color:#fff; margin-bottom:10px; font-size: 14px;">NHẬP KEY ĐĂNG NHẬP</h3>
    <input type="text" id="keyInput" placeholder="Nhập Key...">
    <button id="btnLogin">UNLOCK</button>
</div>

<div class="panel" id="panel">
    <div style="text-align: center; color: #fff; font-size: 12px; margin-bottom: 15px; opacity: 0.6;">AIM HEAD PANEL</div>
    
    <div class="main-grid">
        <!-- Cột trái: AIM -->
        <div>
            <div class="group-title">AIM ASSIST</div>
            <div class="column-grid">
                <button class="btn-f" data-cmd="aim_body"><span class="icon">🎯</span>BODY</button>
                <button class="btn-f" data-cmd="aim_head"><span class="icon">👤</span>HEAD</button>
                <button class="btn-f" data-cmd="aim_neck"><span class="icon">🔴</span>NECK</button>
                <button class="btn-f" data-cmd="aim_drag"><span class="icon">🌀</span>DRAG</button>
            </div>
        </div>
        
        <!-- Cột phải: ESP -->
        <div>
            <div class="group-title">ESP VISUAL</div>
            <div class="column-grid">
                <button class="btn-f" data-cmd="esp_line"><span class="icon">📏</span>LINE</button>
                <button class="btn-f" data-cmd="esp_box"><span class="icon">📦</span>BOX</button>
                <button class="btn-f" data-cmd="esp_skel"><span class="icon">🦴</span>SKEL</button>
                <button class="btn-f" data-cmd="esp_name"><span class="icon">🏷️</span>NAME</button>
            </div>
        </div>
    </div>
</div>

<script>
    var KEY='01';
    var loginBox = document.getElementById('loginBox');
    
    document.getElementById('btnLogin').onclick = function(){
        if(document.getElementById('keyInput').value === KEY){
            loginBox.style.display = 'none';
            document.querySelectorAll('.btn-f').forEach(b => b.style.opacity = '1');
        } else {
            alert("Sai Key!");
        }
    };
    
    document.querySelectorAll('.btn-f').forEach(btn => {
        btn.onclick = function(){
            if(loginBox.style.display !== 'none') return;
            this.classList.toggle('active');
        }
    });

    var tc=0;
    document.addEventListener('touchstart', e => {
        if(e.touches.length===4){
            tc++;
            if(tc>=2) document.getElementById('panel').classList.toggle('hidden');
        }
    });
</script>
</body>
</html>
